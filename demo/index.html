<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PlantUML → Draw.io Converter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    textarea {
      width: 48%;
      height: 400px;
      padding: 10px;
      font-family: monospace;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
      border: none;
      background-color: #007bff;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <h1>PlantUML → Draw.io Converter</h1>

  <div class="container">
    <textarea id="input" placeholder="Enter PlantUML here...">
actor User
database DB
queue Queue

User -> DB
DB --> Queue
    </textarea>

    <textarea id="output" placeholder="Draw.io XML output..." readonly></textarea>
  </div>

  <button onclick="convert()">Convert</button>

  <script type="module">
    import { convertPlantUMLToDrawIO } from "./index.js";

    window.convert = function () {
      const input = document.getElementById("input").value;
      const output = convertPlantUMLToDrawIO(input);
      document.getElementById("output").value = output;
    };
  </script>

</body>
</html>
